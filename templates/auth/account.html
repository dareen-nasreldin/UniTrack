{% extends "base.html" %}
{% block title %}Account - UniTrack{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="page-title">
        <svg class="page-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="10" cy="7" r="4"/>
            <path d="M2 18c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Account
    </h2>

    <div class="form-group">
        <label class="form-label">Email</label>
        <p class="account-email">{{ current_user.email }}</p>
    </div>

    <div class="task-secondary-actions" style="margin-top:2rem;border-top:1px solid var(--border);padding-top:1.5rem">
        <div>
            <p style="font-size:0.875rem;font-weight:700;color:var(--danger);margin-bottom:0.25rem">Delete account</p>
            <p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:1rem">Permanently removes your account and all tasks. Cannot be undone.</p>
            <div class="del-wrap" style="display:block">
                <button type="button" class="btn btn-danger del-trigger">Delete my account</button>
                <div class="del-confirm del-confirm-banner">
                    <span class="del-confirm-banner-text">Delete your account and all data? This cannot be undone.</span>
                    <form method="POST" action="{{ url_for('auth.delete_account') }}">
                        <button type="submit" class="btn btn-danger btn-small">Yes, delete everything</button>
                    </form>
                    <button type="button" class="btn btn-secondary btn-small del-no">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
